server {
    listen       80;
    server_name  localhost;

    # Enable gzip compression for standard enterprise payloads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Root directory pointing to built Vite assets
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Handle React Router natively mapping any unhandled URLs back to the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security Headers strictly enforcing HTTPS overrides and XSS protection
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
